<!DOCTYPE html>

<head>

<body class="page-contact">
<div id="site-header"></div>
<div id="site-fab"></div>
<main>
<div class="breadcrumb"><div class="container"><a href="index.html">トップ</a><span>＞</span>お問い合わせ</div></div>
<section class="page-header" style="background: var(--bg-alt); padding: 100px 0;"><div class="container reveal active"><span class="label">Contact</span><h1 class="title-large">お問い合わせ</h1></div></section>
<section class="contact-form"><div class="container reveal"><div style="max-width: 800px; margin: 0 auto; background: #fff; padding: 60px; border: 1px solid var(--border); border-radius: 8px;"><p style="margin-bottom: 40px; text-align: center; font-size: 15px;">サービスのご利用、協業に関するご相談など、お気軽にお問い合わせください。<br>担当者より24時間以内にご連絡いたします。</p><form><div class="form-group"><label>会社名 <span style="color: var(--primary);">*</span></label><input type="text" class="form-control" placeholder="株式会社Enjin"></div><div class="grid-2" style="gap: 20px;"><div class="form-group"><label>お名前 <span style="color: var(--primary);">*</span></label><input type="text" class="form-control" placeholder="山田 太郎"></div><div class="form-group"><label>メールアドレス <span style="color: var(--primary);">*</span></label><input type="email" class="form-control" placeholder="example@enjin.co.jp"></div></div><div class="form-group"><label>電話番号 <span style="color: var(--primary);">*</span></label><input type="tel" class="form-control" placeholder="03-1234-5678"></div><div class="form-group"><label>お問い合わせ内容 <span style="color: var(--primary);">*</span></label><textarea class="form-control" style="height: 200px;" placeholder="ご相談内容を入力してください"></textarea></div><div style="text-align: center; margin-top: 50px;"><button type="button" class="cta-btn-nav" style="width: 300px; padding: 20px; font-size: 16px; cursor: pointer;">送信内容を確認する</button></div></form></div></div></section>
</main>
<div id="site-footer"></div>
